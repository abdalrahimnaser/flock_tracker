<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُتابع القطيع v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(165deg, #fafaf9 0%, #f5f5f4 50%, #fefce8 100%); }
        #formPanel { transition: transform 0.3s ease; }
        #formBackdrop { transition: opacity 0.3s ease; }
        .card-details { transition: max-height 0.25s ease, opacity 0.2s ease; }
        .toast-enter { animation: toastIn 0.3s ease forwards; }
        .toast-exit { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(1rem); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(1rem); }
        }
    </style>
</head>
<body class="text-stone-800 min-h-screen font-sans relative pb-24">

    <div class="container mx-auto p-4 max-w-5xl">
        <header class="my-6">
            <div class="text-center mb-5">
                <h1 class="text-3xl font-bold text-lime-700">مُتابع القطيع</h1>
                <p class="text-stone-500 text-sm mt-1">إدارة القطيع — عرض بطاقات وتفاصيل موسّعة</p>
            </div>
            <div id="statsBar" class="grid grid-cols-3 gap-3 text-center">
                <div class="bg-white border border-stone-200 rounded-xl p-3 shadow-sm">
                    <div id="statTotal" class="text-2xl font-bold text-lime-700">0</div>
                    <div class="text-xs text-stone-500 mt-0.5">إجمالي القطيع</div>
                </div>
                <div class="bg-white border border-stone-200 rounded-xl p-3 shadow-sm">
                    <div id="statBreeds" class="text-2xl font-bold text-amber-600">0</div>
                    <div class="text-xs text-stone-500 mt-0.5">سلالات</div>
                </div>
                <div class="bg-white border border-stone-200 rounded-xl p-3 shadow-sm">
                    <div id="statMothers" class="text-2xl font-bold text-rose-600">0</div>
                    <div class="text-xs text-stone-500 mt-0.5">أمهات</div>
                </div>
            </div>
        </header>

        <main class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-stone-200">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
                <h2 class="text-lg font-bold text-right">سجل القطيع</h2>
                <p id="resultsCount" class="text-xs text-stone-500 text-right"></p>
            </div>

            <div class="mb-3">
                <input type="text" id="searchBar" placeholder="ابحث برقم الخروف، الاسم، السلالة، أو الملاحظات..."
                    class="w-full bg-stone-50 border border-stone-300 rounded-lg p-3 text-stone-900 focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500 outline-none text-sm">
            </div>

            <div id="breedFilters" class="flex flex-wrap gap-2 mb-5"></div>

            <div id="sheepList" class="space-y-3"></div>

            <div id="emptyState" class="hidden text-center py-16 px-4">
                <div class="text-5xl mb-4 opacity-40">🐑</div>
                <p class="text-stone-500 text-sm mb-4">لا توجد سجلات بعد — ابدأ بإضافة أول رأس في القطيع</p>
                <button onclick="openFormPanel(true)" class="bg-lime-600 hover:bg-lime-700 transition font-semibold py-2.5 px-6 rounded-lg text-sm text-white">
                    + تسجيل رأس جديد
                </button>
            </div>
        </main>
    </div>

    <!-- Floating add button -->
    <button id="fabAdd" onclick="openFormPanel(true)"
        class="fixed bottom-6 left-6 z-30 bg-lime-600 hover:bg-lime-700 text-white w-14 h-14 rounded-full shadow-lg shadow-stone-300/60 flex items-center justify-center text-2xl font-light transition hover:scale-105 active:scale-95"
        title="تسجيل رأس جديد" aria-label="تسجيل رأس جديد">+</button>

    <!-- Form slide-over backdrop -->
    <div id="formBackdrop" onclick="closeFormPanel()"
        class="fixed inset-0 bg-stone-900/30 backdrop-blur-sm z-40 hidden opacity-0"></div>

    <!-- Form slide-over panel -->
    <div id="formPanel"
        class="fixed top-0 right-0 h-full w-full max-w-md bg-white border-l border-stone-200 z-50 flex flex-col translate-x-full shadow-2xl">
        <div class="flex items-center justify-between p-5 border-b border-stone-200 shrink-0">
            <button onclick="closeFormPanel()" class="text-stone-400 hover:text-stone-700 text-xl font-bold w-8 h-8 flex items-center justify-center rounded-lg hover:bg-stone-100 transition" aria-label="إغلاق">&times;</button>
            <h2 id="formTitle" class="text-lg font-bold text-lime-700">تسجيل رأس جديد</h2>
        </div>
        <div class="overflow-y-auto flex-1 p-5">
            <form id="sheepForm" class="space-y-4 text-right">
                <input type="hidden" id="formMode" value="CREATE">

                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">رقم الخروف *</label>
                    <input type="text" id="tag_id" required class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500 disabled:opacity-50">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">سلالة الخروف</label>
                    <input type="text" id="breed" list="breedOptions" class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500" placeholder="غير محدد">
                    <datalist id="breedOptions">
                        <option value="دروبر">
                        <option value="سفلك">
                        <option value="عساف">
                        <option value="بلدي">
                    </datalist>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">جنس الخروف</label>
                    <select id="sheep_type" required class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                        <option value="حملة">حملة</option>
                        <option value="خروف">خروف</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">حالة الحياة</label>
                    <select id="life_status" required class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                        <option value="حي">حي</option>
                        <option value="ميت">ميت</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">تاريخ الولادة</label>
                    <input type="date" id="birth_date" class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                </div>
                <div class="p-3 bg-stone-50 rounded-lg border border-stone-200 space-y-3">
                    <span class="block text-xs font-bold text-stone-500">حالة الأمومة</span>
                    <div>
                        <label class="block text-xs font-medium mb-1 text-stone-500">حالة الأم</label>
                        <select id="mother_status" required class="w-full bg-white border border-stone-300 rounded-lg p-2 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                            <option value="ليس أم بعد">ليس أم بعد</option>
                            <option value="أم">أم</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium mb-1 text-stone-500">رقم الأم</label>
                        <select id="mother_id" class="w-full bg-white border border-stone-300 rounded-lg p-2 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                            <option value="">بدون أم</option>
                        </select>
                    </div>
                </div>
                <div class="p-3 bg-stone-50 rounded-lg border border-stone-200 space-y-3">
                    <span class="block text-xs font-bold text-stone-500">بيانات الشراء</span>
                    <div>
                        <label class="block text-xs font-medium mb-1 text-stone-500">تاريخ الشراء</label>
                        <input type="date" id="purchase_date" class="w-full bg-white border border-stone-300 rounded-lg p-2 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium mb-1 text-stone-500">سعر الشراء</label>
                        <input type="number" step="0.01" id="purchase_price" class="w-full bg-white border border-stone-300 rounded-lg p-2 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium mb-1 text-stone-500">مكان الشراء</label>
                        <input type="text" id="purchase_location" class="w-full bg-white border border-stone-300 rounded-lg p-2 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">اسم الخروف</label>
                    <input type="text" id="name" class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-stone-700">ملاحظات</label>
                    <textarea id="notes" rows="4" placeholder="أدخل الملاحظات هنا..." class="w-full bg-white border border-stone-300 rounded-lg p-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-lime-500/40 focus:border-lime-500 text-sm resize-none"></textarea>
                </div>
            </form>
        </div>
        <div class="p-5 border-t border-stone-200 shrink-0 space-y-2 bg-white">
            <button type="submit" form="sheepForm" id="submitBtn" class="w-full bg-lime-600 hover:bg-lime-700 transition font-bold py-3 px-4 rounded-lg text-white">
                حفظ البيانات
            </button>
            <button type="button" id="cancelBtn" onclick="closeFormPanel(); resetFormState();" class="w-full bg-stone-100 hover:bg-stone-200 text-stone-700 transition font-medium py-2 px-4 rounded-lg hidden">
                إلغاء
            </button>
        </div>
    </div>

    <!-- Notes modal -->
    <div id="notesModal" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300" onclick="closeNotesModal()">
        <div class="bg-white border border-stone-200 w-full max-w-lg p-6 rounded-xl shadow-2xl relative mx-4 text-right flex flex-col max-h-[80vh]" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between border-b border-stone-200 pb-3 mb-4">
                <button onclick="closeNotesModal()" class="text-stone-400 hover:text-stone-700 font-bold text-lg">&times;</button>
                <h3 id="modalHeader" class="text-lg font-bold text-lime-700">سجل ملاحظات الخروف</h3>
            </div>
            <div id="modalBody" class="text-sm text-stone-700 overflow-y-auto whitespace-pre-wrap break-words leading-relaxed bg-stone-50 p-4 rounded-lg border border-stone-200 flex-1"></div>
            <div class="mt-4 pt-2 border-t border-stone-200 flex justify-end">
                <button onclick="closeNotesModal()" class="bg-stone-100 hover:bg-stone-200 text-stone-700 text-xs font-semibold px-4 py-2 rounded-lg transition">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 items-center pointer-events-none w-full max-w-sm px-4"></div>

    <script>
        let allSheep = [];
        let activeBreedFilter = '';
        let expandedCards = new Set();

        document.addEventListener('DOMContentLoaded', () => {
            fetchSheep();
            fetchBreeds();
        });

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = {
                success: 'bg-lime-50 border-lime-300 text-lime-800',
                error:   'bg-red-50 border-red-200 text-red-800',
                info:    'bg-stone-100 border-stone-300 text-stone-800'
            };
            toast.className = `pointer-events-auto toast-enter px-4 py-3 rounded-lg border text-sm font-medium shadow-lg text-center w-full ${colors[type] || colors.info}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        }

        function openFormPanel(reset = false) {
            if (reset) resetFormState();
            populateMotherOptions(document.getElementById('tag_id').disabled ? document.getElementById('tag_id').value : '');
            document.getElementById('formBackdrop').classList.remove('hidden');
            document.getElementById('formPanel').classList.remove('translate-x-full');
            requestAnimationFrame(() => {
                document.getElementById('formBackdrop').classList.remove('opacity-0');
            });
            document.body.style.overflow = 'hidden';
        }

        function closeFormPanel() {
            document.getElementById('formBackdrop').classList.add('opacity-0');
            document.getElementById('formPanel').classList.add('translate-x-full');
            document.body.style.overflow = '';
            setTimeout(() => document.getElementById('formBackdrop').classList.add('hidden'), 300);
        }

        async function fetchBreeds() {
            try {
                const response = await fetch('/api/breeds');
                const cloudBreeds = await response.json();
                const datalist = document.getElementById('breedOptions');
                const defaults = ['دروبر', 'سفلك', 'عساف', 'بلدي'];
                cloudBreeds.forEach(b => {
                    if (!defaults.includes(b)) {
                        const opt = document.createElement('option');
                        opt.value = b;
                        datalist.appendChild(opt);
                    }
                });
            } catch (err) { console.error(err); }
        }

        function populateMotherOptions(excludeTagId = '') {
            const select = document.getElementById('mother_id');
            const currentValue = select.value;
            const candidates = allSheep
                .filter(s => s.tag_id !== excludeTagId && s.sheep_type === 'حملة')
                .sort((a, b) => a.tag_id.localeCompare(b.tag_id, 'ar'));

            select.innerHTML = '<option value="">بدون أم</option>';
            candidates.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.tag_id;
                opt.textContent = s.tag_id;
                select.appendChild(opt);
            });

            if (currentValue && [...select.options].some(o => o.value === currentValue)) {
                select.value = currentValue;
            }
        }

        function breedLabel(breed) {
            return breed && breed.trim() ? breed.trim() : 'غير محدد';
        }

        function getChildren(tagId) {
            return allSheep.filter(s => s.mother_id === tagId);
        }

        function childCountLabel(count) {
            if (count === 1) return '1 ابن';
            if (count === 2) return '2 ابنان';
            if (count >= 3 && count <= 10) return `${count} أبناء`;
            return `${count} ابناً`;
        }

        async function fetchSheep() {
            try {
                const response = await fetch('/api/sheep');
                allSheep = await response.json();
                updateStats();
                renderBreedFilters();
                applyFilters();
            } catch (error) {
                console.error(error);
                showToast('تعذر تحميل بيانات القطيع', 'error');
            }
        }

        function updateStats() {
            const breeds = new Set(allSheep.map(s => s.breed).filter(Boolean));
            const mothers = allSheep.filter(s => s.mother_status === 'أم').length;
            document.getElementById('statTotal').textContent = allSheep.length;
            document.getElementById('statBreeds').textContent = breeds.size;
            document.getElementById('statMothers').textContent = mothers;
        }

        function renderBreedFilters() {
            const container = document.getElementById('breedFilters');
            const breeds = [...new Set(allSheep.map(s => s.breed).filter(Boolean))].sort();
            const chipClass = (active) => active
                ? 'bg-lime-600 border-lime-600 text-white'
                : 'bg-white border-stone-300 text-stone-600 hover:bg-stone-50';

            let html = `<button data-breed="" class="breed-chip px-3 py-1 rounded-full text-xs font-medium border transition ${chipClass(!activeBreedFilter)}">الكل</button>`;
            breeds.forEach(b => {
                html += `<button data-breed="${escapeHtml(b)}" class="breed-chip px-3 py-1 rounded-full text-xs font-medium border transition ${chipClass(activeBreedFilter === b)}">${escapeHtml(b)}</button>`;
            });
            container.innerHTML = html;
        }

        function setBreedFilter(breed) {
            activeBreedFilter = breed;
            renderBreedFilters();
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchBar').value.trim().toLowerCase();
            let filtered = allSheep;

            if (activeBreedFilter) {
                filtered = filtered.filter(s => s.breed === activeBreedFilter);
            }
            if (query) {
                filtered = filtered.filter(s => {
                    const combined = `${s.tag_id} ${s.name} ${breedLabel(s.breed)} ${s.sheep_type} ${s.life_status} ${s.mother_status} ${s.mother_id} ${s.child_count} ${s.birth_date} ${s.purchase_date} ${s.purchase_price} ${s.purchase_location} ${s.notes}`.toLowerCase();
                    return combined.includes(query);
                });
            }

            renderCards(filtered);
        }

        function hasPurchase(s) {
            return !!(s.purchase_date || s.purchase_price || s.purchase_location);
        }

        function hasNotes(s) {
            return !!(s.notes && s.notes.trim());
        }

        function renderCards(data) {
            const list = document.getElementById('sheepList');
            const empty = document.getElementById('emptyState');
            const resultsCount = document.getElementById('resultsCount');

            if (allSheep.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                resultsCount.textContent = '';
                return;
            }

            empty.classList.add('hidden');

            const isFiltered = data.length !== allSheep.length || activeBreedFilter || document.getElementById('searchBar').value.trim();
            resultsCount.textContent = isFiltered ? `عرض ${data.length} من ${allSheep.length}` : `${allSheep.length} رأس`;

            if (data.length === 0) {
                list.innerHTML = `<div class="text-center py-12 text-stone-500 text-sm">لا توجد نتائج مطابقة للبحث أو الفلتر</div>`;
                return;
            }

            list.innerHTML = data.map(s => {
                const safeTag = escapeHtml(s.tag_id);
                const isExpanded = expandedCards.has(s.tag_id);
                const childCount = s.child_count || 0;
                const children = getChildren(s.tag_id);
                const isDead = s.life_status === 'ميت';
                const metaHtml = (s.sheep_type || s.breed || s.mother_status || childCount || s.life_status)
                    ? `<div class="text-stone-500 text-sm mt-0.5 flex items-center gap-2 flex-wrap justify-start">
                        ${s.life_status === 'ميت' ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-red-600 text-white">ميت</span>` : `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">حي</span>`}
                        ${s.sheep_type ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${s.sheep_type === 'حملة' ? 'bg-amber-100 text-amber-700' : 'bg-sky-100 text-sky-700'}">${escapeHtml(s.sheep_type)}</span>` : ''}
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full ${s.breed && s.breed.trim() ? 'bg-lime-100 text-lime-700' : 'bg-stone-100 text-stone-500'}">${escapeHtml(breedLabel(s.breed))}</span>
                        ${s.mother_status === 'أم' ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-rose-100 text-rose-700">أم</span>` : ''}
                        ${childCount > 0 ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-violet-100 text-violet-700">${childCountLabel(childCount)}</span>` : ''}
                       </div>`
                    : '';

                const birthRow = s.birth_date
                    ? `<div class="flex justify-between text-sm"><span class="text-stone-500">تاريخ الولادة</span><span>${escapeHtml(s.birth_date)}</span></div>`
                    : '';

                const purchaseRows = hasPurchase(s) ? `
                    <div class="text-xs font-bold text-stone-500 mb-2 mt-1">بيانات الشراء</div>
                    ${s.purchase_date ? `<div class="flex justify-between text-sm mb-1"><span class="text-stone-500">التاريخ</span><span>${escapeHtml(s.purchase_date)}</span></div>` : ''}
                    ${s.purchase_price ? `<div class="flex justify-between text-sm mb-1"><span class="text-stone-500">السعر</span><span>${escapeHtml(s.purchase_price)}</span></div>` : ''}
                    ${s.purchase_location ? `<div class="flex justify-between text-sm mb-1"><span class="text-stone-500">المكان</span><span>${escapeHtml(s.purchase_location)}</span></div>` : ''}
                ` : `<div class="text-sm text-stone-500">لا توجد بيانات شراء</div>`;

                const notesPreview = hasNotes(s)
                    ? `<p class="text-sm text-stone-600 line-clamp-2 leading-relaxed mb-2">${escapeHtml(s.notes.slice(0, 120))}${s.notes.length > 120 ? '…' : ''}</p>
                       <button data-action="notes" data-tag="${safeTag}" class="text-lime-700 hover:text-lime-800 text-xs font-semibold transition">عرض السجل الكامل ←</button>`
                    : `<span class="text-sm text-stone-500">لا توجد ملاحظات</span>`;

                return `
                <div class="border border-stone-200 rounded-lg overflow-hidden bg-white ${isDead ? 'opacity-75' : ''}" data-tag="${safeTag}">
                    <div class="px-3 py-3 cursor-pointer select-none card-header">
                        <div class="flex items-center justify-between gap-4" dir="ltr">
                            <div class="flex items-center gap-0.5 shrink-0">
                                <button data-action="edit" data-tag="${safeTag}" title="تعديل" class="p-2 rounded-md text-stone-400 hover:text-stone-700 hover:bg-stone-100 transition" aria-label="تعديل">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path stroke-linecap="round" stroke-linejoin="round" d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                </button>
                                <button data-action="delete" data-tag="${safeTag}" title="حذف" class="p-2 rounded-md text-stone-400 hover:text-red-600 hover:bg-red-50 transition" aria-label="حذف">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                                <span class="p-2 text-stone-400 text-xs transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}">▼</span>
                            </div>
                            <div class="flex-1 min-w-0 text-right" dir="rtl">
                                <div class="flex items-baseline gap-2 flex-wrap justify-start">
                                    <span class="text-xl font-semibold text-stone-900">${safeTag}</span>
                                </div>
                                ${metaHtml}
                            </div>
                        </div>
                    </div>
                    <div class="card-details overflow-hidden border-t border-stone-200 ${isExpanded ? 'max-h-[600px] opacity-100' : 'max-h-0 opacity-0'}">
                        <div class="p-4 space-y-4 bg-stone-50 text-right">
                            ${s.name ? `<div class="flex justify-between text-sm"><span class="text-stone-500">اسم الخروف</span><span>${escapeHtml(s.name)}</span></div>` : ''}
                            ${birthRow}
                            ${s.sheep_type ? `<div class="flex justify-between text-sm"><span class="text-stone-500">جنس الخروف</span><span>${escapeHtml(s.sheep_type)}</span></div>` : ''}
                            ${s.life_status ? `<div class="flex justify-between text-sm"><span class="text-stone-500">حالة الحياة</span><span>${escapeHtml(s.life_status)}</span></div>` : ''}
                            ${s.breed !== undefined ? `<div class="flex justify-between text-sm"><span class="text-stone-500">سلالة الخروف</span><span>${escapeHtml(breedLabel(s.breed))}</span></div>` : ''}
                            ${s.mother_status ? `<div class="flex justify-between text-sm"><span class="text-stone-500">حالة الأم</span><span>${escapeHtml(s.mother_status)}</span></div>` : ''}
                            ${childCount > 0 ? `<div class="flex justify-between text-sm"><span class="text-stone-500">عدد الأبناء</span><span>${childCountLabel(childCount)}</span></div>` : ''}
                            ${children.length ? `<div class="text-sm"><span class="text-stone-500 block mb-1">أرقام الأبناء</span><span class="text-stone-800">${children.map(c => escapeHtml(c.tag_id)).join(' · ')}</span></div>` : ''}
                            ${s.mother_id ? `<div class="flex justify-between text-sm"><span class="text-stone-500">رقم الأم</span><span>${escapeHtml(s.mother_id)}</span></div>` : ''}
                            <div class="bg-white rounded-lg p-3 border border-stone-200">${purchaseRows}</div>
                            <div class="bg-white rounded-lg p-3 border border-stone-200">
                                <div class="text-xs font-bold text-stone-500 mb-2">الملاحظات والسجل</div>
                                ${notesPreview}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleCard(tagId) {
            if (expandedCards.has(tagId)) {
                expandedCards.delete(tagId);
            } else {
                expandedCards.add(tagId);
            }
            applyFilters();
        }

        function openNotesModal(tagId) {
            const sheep = allSheep.find(s => s.tag_id === tagId);
            if (!sheep || !sheep.notes) return;

            document.getElementById('modalHeader').innerText = `سجل وملاحظات الخروف رقم (${tagId})`;
            document.getElementById('modalBody').innerText = sheep.notes;

            const modal = document.getElementById('notesModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeNotesModal() {
            const modal = document.getElementById('notesModal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function startEdit(tagId) {
            const sheep = allSheep.find(s => s.tag_id === tagId);
            if (!sheep) return;

            document.getElementById('tag_id').value = sheep.tag_id;
            document.getElementById('tag_id').disabled = true;
            document.getElementById('name').value = sheep.name || '';
            document.getElementById('breed').value = sheep.breed || '';
            document.getElementById('sheep_type').value = sheep.sheep_type || 'حملة';
            document.getElementById('life_status').value = sheep.life_status || 'حي';
            document.getElementById('birth_date').value = sheep.birth_date || '';
            document.getElementById('mother_status').value = sheep.mother_status || 'ليس أم بعد';
            populateMotherOptions(sheep.tag_id);
            document.getElementById('mother_id').value = sheep.mother_id || '';
            document.getElementById('purchase_date').value = sheep.purchase_date || '';
            document.getElementById('purchase_price').value = sheep.purchase_price || '';
            document.getElementById('purchase_location').value = sheep.purchase_location || '';
            document.getElementById('notes').value = sheep.notes || '';

            document.getElementById('formMode').value = 'UPDATE';
            document.getElementById('formTitle').innerText = `تعديل الخروف (${tagId})`;
            document.getElementById('formTitle').className = 'text-lg font-bold text-amber-600';
            document.getElementById('submitBtn').innerText = 'تحديث البيانات';
            document.getElementById('submitBtn').className = 'w-full bg-amber-600 hover:bg-amber-700 transition font-bold py-3 px-4 rounded-lg text-white';
            document.getElementById('cancelBtn').classList.remove('hidden');

            openFormPanel();
        }

        function resetFormState() {
            document.getElementById('sheepForm').reset();
            document.getElementById('tag_id').disabled = false;
            document.getElementById('mother_status').value = 'ليس أم بعد';
            document.getElementById('life_status').value = 'حي';
            populateMotherOptions();
            document.getElementById('formMode').value = 'CREATE';
            document.getElementById('formTitle').innerText = 'تسجيل رأس جديد';
            document.getElementById('formTitle').className = 'text-lg font-bold text-lime-700';
            document.getElementById('submitBtn').innerText = 'حفظ البيانات';
            document.getElementById('submitBtn').className = 'w-full bg-lime-600 hover:bg-lime-700 transition font-bold py-3 px-4 rounded-lg text-white';
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        async function deleteSheep(tagId) {
            if (!confirm(`هل أنت متأكد من حذف الخروف رقم (${tagId}) نهائياً؟`)) return;

            try {
                const response = await fetch(`/api/sheep/${tagId}`, { method: 'DELETE' });
                const result = await response.json();
                showToast(result.message, result.success !== false ? 'success' : 'error');

                if (document.getElementById('tag_id').value === tagId && document.getElementById('formMode').value === 'UPDATE') {
                    closeFormPanel();
                    resetFormState();
                }
                expandedCards.delete(tagId);
                fetchSheep();
            } catch (err) {
                showToast('تعذر تنفيذ عملية الحذف', 'error');
            }
        }

        document.getElementById('breedFilters').addEventListener('click', (e) => {
            const chip = e.target.closest('[data-breed]');
            if (chip) setBreedFilter(chip.dataset.breed);
        });

        document.getElementById('sheepList').addEventListener('click', (e) => {
            const actionBtn = e.target.closest('[data-action]');
            if (actionBtn) {
                e.stopPropagation();
                const tag = actionBtn.dataset.tag;
                const action = actionBtn.dataset.action;
                if (action === 'edit') startEdit(tag);
                else if (action === 'delete') deleteSheep(tag);
                else if (action === 'notes') openNotesModal(tag);
                return;
            }
            const header = e.target.closest('.card-header');
            if (header) {
                const card = header.closest('[data-tag]');
                if (card) toggleCard(card.dataset.tag);
            }
        });

        document.getElementById('searchBar').addEventListener('input', applyFilters);

        document.getElementById('sheepForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mode = document.getElementById('formMode').value;
            const tagId = document.getElementById('tag_id').value;

            const payload = {
                name: document.getElementById('name').value,
                breed: document.getElementById('breed').value,
                sheep_type: document.getElementById('sheep_type').value,
                life_status: document.getElementById('life_status').value,
                birth_date: document.getElementById('birth_date').value,
                mother_status: document.getElementById('mother_status').value,
                mother_id: document.getElementById('mother_id').value,
                purchase_date: document.getElementById('purchase_date').value,
                purchase_price: document.getElementById('purchase_price').value,
                purchase_location: document.getElementById('purchase_location').value,
                notes: document.getElementById('notes').value
            };

            let url = '/api/sheep';
            let method = 'POST';

            if (mode === 'UPDATE') {
                url = `/api/sheep/${tagId}`;
                method = 'PUT';
            } else {
                payload.tag_id = tagId;
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    showToast(result.message, 'success');
                    closeFormPanel();
                    resetFormState();
                    fetchSheep();
                    fetchBreeds();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('تعذر حفظ البيانات', 'error');
            }
        });
    </script>
</body>
</html>

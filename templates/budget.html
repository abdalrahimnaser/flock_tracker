<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية المزرعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(165deg, #fafaf9 0%, #f5f5f4 50%, #fff7ed 100%); }
        .toast-enter { animation: toastIn 0.3s ease forwards; }
        .toast-exit { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(1rem); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(1rem); }
        }
        .type-btn.selected-in { background: #059669; color: white; border-color: #059669; }
        .type-btn.selected-out { background: #dc2626; color: white; border-color: #dc2626; }
        .num { font-variant-numeric: tabular-nums; direction: ltr; unicode-bidi: isolate; }
        .tx-table { width: 100%; border-collapse: collapse; }
        .tx-table thead th {
            padding: 0.75rem 0.875rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: #292524;
            text-align: right;
            background: #f5f5f4;
            border-bottom: 2px solid #d6d3d1;
            white-space: nowrap;
        }
        .tx-table thead th.num-col { text-align: left; }
        .tx-table tbody td {
            padding: 0.75rem 0.875rem;
            border-bottom: 1px solid #f5f5f4;
            vertical-align: middle;
        }
        .tx-table tbody tr:last-child td { border-bottom: none; }
        .tx-table .col-date { width: 6.5rem; white-space: nowrap; }
        .tx-table .col-desc { min-width: 8rem; }
        .tx-table .col-amount { width: 8.75rem; min-width: 8.75rem; text-align: left; }
        .tx-table .col-balance { width: 8.75rem; min-width: 8.75rem; text-align: left; }
        .tx-table .col-actions { width: 4.5rem; padding-left: 0.25rem; padding-right: 0.25rem; }
        .tx-feed-item {
            padding: 0.875rem 0;
            border-bottom: 1px solid #e7e5e4;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .tx-feed-item:active { background: #fafaf9; }
        .tx-feed-item:last-child { border-bottom: none; }
        .tx-feed-month {
            font-size: 0.8125rem;
            font-weight: 700;
            color: #78716c;
            padding: 1rem 0 0.375rem;
        }
        .tx-feed-month:first-child { padding-top: 0; }
        .stat-box { min-width: 0; overflow: hidden; }
        .stat-value {
            font-size: clamp(0.8125rem, 3.2vw, 1.5rem);
            line-height: 1.25;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .filter-panel { transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease; }
        .filter-panel:not(.expanded) { padding-top: 0; padding-bottom: 0; border-width: 0; }
        .filter-chip.selected { background: #d97706; color: white; border-color: #d97706; }
    </style>
</head>
<body class="text-stone-800 min-h-screen font-sans relative pb-24">

    <nav class="bg-white border-b border-stone-200 sticky top-0 z-40">
        <div class="container mx-auto max-w-3xl px-4 py-3 flex items-center justify-center gap-2">
            <a href="/" class="px-4 py-2 rounded-lg text-sm font-medium text-stone-600 hover:bg-stone-100 transition">
                مُتابع القطيع
            </a>
            <a href="/budget" class="px-4 py-2 rounded-lg text-sm font-medium bg-amber-600 text-white shadow-sm">
                ميزانية المزرعة
            </a>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-3xl">
        <header class="my-6 text-center">
            <h1 class="text-3xl font-bold text-amber-700">ميزانية المزرعة</h1>
            <p class="text-stone-500 text-sm mt-1">تتبع النقدية — إيرادات ومصروفات</p>
        </header>

        <div id="statsBar" class="grid grid-cols-3 gap-2 sm:gap-3 text-center mb-6">
            <div class="stat-box bg-white border border-stone-200 rounded-xl p-3 sm:p-4 shadow-sm">
                <div id="statBalance" class="stat-value font-bold text-amber-700 num">—</div>
                <div class="text-[11px] sm:text-xs text-stone-500 mt-0.5">الرصيد الحالي</div>
            </div>
            <div class="stat-box bg-white border border-stone-200 rounded-xl p-3 sm:p-4 shadow-sm">
                <div id="statIncome" class="stat-value font-bold text-emerald-600 num">—</div>
                <div class="text-[11px] sm:text-xs text-stone-500 mt-0.5">إيرادات الشهر</div>
            </div>
            <div class="stat-box bg-white border border-stone-200 rounded-xl p-3 sm:p-4 shadow-sm">
                <div id="statExpenses" class="stat-value font-bold text-red-600 num">—</div>
                <div class="text-[11px] sm:text-xs text-stone-500 mt-0.5">مصروفات الشهر</div>
            </div>
        </div>

        <section class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-stone-200 mb-6">
            <h2 class="text-lg font-bold mb-4">تسجيل حركة جديدة</h2>
            <form id="addForm" class="space-y-4">
                <div class="flex gap-2">
                    <button type="button" id="btnIncome" data-type="in"
                        class="type-btn flex-1 py-2.5 rounded-lg border border-stone-200 text-sm font-medium transition hover:border-emerald-400">
                        إيراد
                    </button>
                    <button type="button" id="btnExpense" data-type="out"
                        class="type-btn flex-1 py-2.5 rounded-lg border border-stone-200 text-sm font-medium transition hover:border-red-400 selected-out">
                        مصروف
                    </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-medium text-stone-500 block mb-1">المبلغ</label>
                        <input type="text" id="amount" inputmode="decimal" lang="en" required placeholder="0.00"
                            class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500 num">
                    </div>
                    <div>
                        <label class="text-xs font-medium text-stone-500 block mb-1">التاريخ</label>
                        <input type="date" id="transactionDate" required
                            class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-medium text-stone-500 block mb-1">الوصف</label>
                    <input type="text" id="description" required placeholder="مثال: علف، بيع خروف، إصلاح سياج..."
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                </div>
                <button type="submit"
                    class="w-full py-3 rounded-lg bg-amber-600 hover:bg-amber-700 text-white font-medium transition shadow-sm">
                    حفظ
                </button>
            </form>
        </section>

        <section class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-stone-200">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
                <h2 class="text-lg font-bold">سجل الحركات</h2>
                <p id="resultsCount" class="text-xs text-stone-500"></p>
            </div>

            <div class="mb-4 space-y-3">
                <div class="flex items-center justify-between gap-3">
                    <button type="button" id="filterToggle" aria-expanded="false"
                        class="inline-flex items-center gap-2 px-3.5 py-2 rounded-full border border-stone-200 bg-white hover:border-stone-300 hover:bg-stone-50 transition text-sm font-medium text-stone-700 shadow-sm">
                        <svg class="w-4 h-4 text-stone-500" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M7 12h10M10 18h4"/>
                        </svg>
                        <span>فلاتر</span>
                        <span id="filterBadge" class="hidden min-w-[1.25rem] h-5 px-1.5 rounded-full bg-amber-600 text-white text-[11px] font-bold leading-none inline-flex items-center justify-center">0</span>
                        <span id="filterChevron" class="text-stone-400 text-[10px] transition-transform duration-200 mr-0.5">▼</span>
                    </button>
                    <button type="button" id="clearFilters" class="hidden text-xs font-medium text-stone-500 hover:text-red-600 transition px-2 py-1 rounded-md hover:bg-red-50">
                        مسح الفلاتر
                    </button>
                </div>

                <div id="filterPanel" class="filter-panel rounded-2xl bg-stone-50 border border-stone-200/80 px-4 py-0 space-y-4 max-h-0 opacity-0 overflow-hidden">
                    <div class="pt-4 space-y-4">
                        <div>
                            <span class="text-xs font-medium text-stone-500 mb-2 block">نوع الحركة</span>
                            <div class="flex flex-wrap gap-1.5" id="typeFilters">
                                <label class="filter-chip cursor-pointer px-3 py-1.5 rounded-full border border-stone-200 bg-white text-sm font-medium text-stone-600 transition selected">
                                    <input type="radio" name="txType" value="all" class="sr-only" checked>الكل
                                </label>
                                <label class="filter-chip cursor-pointer px-3 py-1.5 rounded-full border border-stone-200 bg-white text-sm font-medium text-stone-600 transition">
                                    <input type="radio" name="txType" value="in" class="sr-only">إيراد
                                </label>
                                <label class="filter-chip cursor-pointer px-3 py-1.5 rounded-full border border-stone-200 bg-white text-sm font-medium text-stone-600 transition">
                                    <input type="radio" name="txType" value="out" class="sr-only">مصروف
                                </label>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-medium text-stone-500 block mb-1">من تاريخ</label>
                                <input type="date" id="filterDateFrom"
                                    class="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                            </div>
                            <div>
                                <label class="text-xs font-medium text-stone-500 block mb-1">إلى تاريخ</label>
                                <input type="date" id="filterDateTo"
                                    class="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-medium text-stone-500 block mb-1">بحث في الوصف</label>
                            <input type="text" id="filterSearch" placeholder="مثال: علف، بيع..."
                                class="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                        </div>
                    </div>
                </div>
            </div>

            <div id="emptyState" class="hidden text-center py-12 text-stone-400">
                <p class="text-sm">لا توجد حركات بعد</p>
                <p class="text-xs mt-1">ابدأ بتسجيل رصيدك الافتتاحي أو أول مصروف</p>
            </div>
            <div id="filterEmptyState" class="hidden text-center py-12 text-stone-400">
                <p class="text-sm">لا توجد حركات مطابقة</p>
                <p class="text-xs mt-1">جرّب تغيير الفلاتر أو مسحها</p>
            </div>
            <div id="txList" class="text-sm sm:overflow-x-auto"></div>
        </section>
    </div>

    <div id="editModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/40" id="editBackdrop"></div>
        <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6">
            <h3 class="text-lg font-bold mb-4">تعديل الحركة</h3>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="flex gap-2">
                    <button type="button" id="editBtnIncome" data-type="in"
                        class="type-btn flex-1 py-2 rounded-lg border border-stone-200 text-sm font-medium transition">
                        + إيراد
                    </button>
                    <button type="button" id="editBtnExpense" data-type="out"
                        class="type-btn flex-1 py-2 rounded-lg border border-stone-200 text-sm font-medium transition">
                        − مصروف
                    </button>
                </div>
                <div>
                    <label class="text-xs font-medium text-stone-500 block mb-1">المبلغ</label>
                    <input type="text" id="editAmount" inputmode="decimal" lang="en" required
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500 num">
                </div>
                <div>
                    <label class="text-xs font-medium text-stone-500 block mb-1">التاريخ</label>
                    <input type="date" id="editDate" required
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                </div>
                <div>
                    <label class="text-xs font-medium text-stone-500 block mb-1">الوصف</label>
                    <input type="text" id="editDescription" required
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-stone-900 outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" id="editCancel"
                        class="flex-1 py-2.5 rounded-lg border border-stone-200 text-stone-600 font-medium hover:bg-stone-50 transition">
                        إلغاء
                    </button>
                    <button type="submit"
                        class="flex-1 py-2.5 rounded-lg bg-amber-600 hover:bg-amber-700 text-white font-medium transition">
                        حفظ
                    </button>
                </div>
                <button type="button" id="editDelete"
                    class="w-full py-2.5 mt-1 rounded-lg text-red-600 text-sm font-medium hover:bg-red-50 transition">
                    حذف الحركة
                </button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        let entryType = 'out';
        let editType = 'out';
        let transactionsCache = [];
        let allTransactions = [];
        let filterPanelOpen = false;

        const numFmt = { minimumFractionDigits: 2, maximumFractionDigits: 2 };

        const EASTERN_DIGITS = '٠١٢٣٤٥٦٧٨٩';
        const PERSIAN_DIGITS = '۰۱۲۳۴۵۶۷۸۹';

        function toWesternDigits(value) {
            return String(value ?? '').replace(/[٠-٩۰-۹]/g, ch => {
                let i = EASTERN_DIGITS.indexOf(ch);
                if (i >= 0) return String(i);
                i = PERSIAN_DIGITS.indexOf(ch);
                return i >= 0 ? String(i) : ch;
            });
        }

        function normalizeDecimalInput(value) {
            let next = toWesternDigits(value).replace(/[^0-9.]/g, '');
            const dot = next.indexOf('.');
            if (dot !== -1) {
                next = next.slice(0, dot + 1) + next.slice(dot + 1).replace(/\./g, '');
            }
            return next;
        }

        function bindWesternDigitInput(el) {
            if (!el) return;
            el.addEventListener('input', () => {
                const next = normalizeDecimalInput(el.value);
                if (next !== el.value) el.value = next;
            });
        }

        bindWesternDigitInput(document.getElementById('amount'));
        bindWesternDigitInput(document.getElementById('editAmount'));
        const fmt = (n) => {
            const abs = Math.abs(n).toLocaleString('en-US', numFmt);
            return n < 0 ? `-${abs}` : `+${abs}`;
        };
        const fmtBalance = (n) => n.toLocaleString('en-US', numFmt);
        const fmtDate = (iso) => {
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            const colors = type === 'error'
                ? 'bg-red-600 text-white'
                : 'bg-stone-800 text-white';
            el.className = `toast-enter px-5 py-3 rounded-xl shadow-lg text-sm font-medium ${colors}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => {
                el.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        function setType(type, isEdit = false) {
            if (isEdit) {
                editType = type;
                document.getElementById('editBtnIncome').classList.toggle('selected-in', type === 'in');
                document.getElementById('editBtnExpense').classList.toggle('selected-out', type === 'out');
            } else {
                entryType = type;
                document.getElementById('btnIncome').classList.toggle('selected-in', type === 'in');
                document.getElementById('btnExpense').classList.toggle('selected-out', type === 'out');
            }
        }

        document.getElementById('btnIncome').addEventListener('click', () => setType('in'));
        document.getElementById('btnExpense').addEventListener('click', () => setType('out'));
        document.getElementById('editBtnIncome').addEventListener('click', () => setType('in', true));
        document.getElementById('editBtnExpense').addEventListener('click', () => setType('out', true));

        document.getElementById('transactionDate').value = new Date().toISOString().slice(0, 10);

        async function fetchTransactions() {
            try {
                const res = await fetch('/api/budget/transactions');
                const data = await res.json();
                allTransactions = data.transactions;
                renderSummary(data.summary);
                applyFiltersAndRender();
            } catch {
                showToast('تعذر تحميل البيانات', 'error');
            }
        }

        function renderSummary(s) {
            const bal = document.getElementById('statBalance');
            bal.textContent = fmtBalance(s.balance);
            bal.className = `stat-value font-bold num ${s.balance >= 0 ? 'text-amber-700' : 'text-red-600'}`;
            const income = document.getElementById('statIncome');
            income.textContent = fmtBalance(s.income_month);
            income.className = 'stat-value font-bold text-emerald-600 num';
            const expenses = document.getElementById('statExpenses');
            expenses.textContent = fmtBalance(s.expenses_month);
            expenses.className = 'stat-value font-bold text-red-600 num';
        }

        function activeFilterCount() {
            let n = 0;
            const type = document.querySelector('input[name="txType"]:checked')?.value;
            if (type && type !== 'all') n++;
            if (document.getElementById('filterDateFrom').value) n++;
            if (document.getElementById('filterDateTo').value) n++;
            if (document.getElementById('filterSearch').value.trim()) n++;
            return n;
        }

        function syncFilterChips() {
            document.querySelectorAll('#typeFilters .filter-chip').forEach(label => {
                const input = label.querySelector('input');
                label.classList.toggle('selected', input.checked);
            });
        }

        function toggleFilterPanel(force) {
            const panel = document.getElementById('filterPanel');
            const toggle = document.getElementById('filterToggle');
            const chevron = document.getElementById('filterChevron');
            filterPanelOpen = typeof force === 'boolean' ? force : !filterPanelOpen;
            panel.classList.toggle('expanded', filterPanelOpen);
            panel.classList.toggle('max-h-0', !filterPanelOpen);
            panel.classList.toggle('opacity-0', !filterPanelOpen);
            panel.classList.toggle('max-h-96', filterPanelOpen);
            panel.classList.toggle('py-4', filterPanelOpen);
            toggle.setAttribute('aria-expanded', filterPanelOpen);
            chevron.style.transform = filterPanelOpen ? 'rotate(180deg)' : '';
        }

        function updateFilterUI(filteredCount) {
            const n = activeFilterCount();
            const badge = document.getElementById('filterBadge');
            const clearBtn = document.getElementById('clearFilters');
            if (n > 0) {
                badge.textContent = n;
                badge.classList.remove('hidden');
                clearBtn.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
                clearBtn.classList.add('hidden');
            }
            const total = allTransactions.length;
            const countEl = document.getElementById('resultsCount');
            if (!total) {
                countEl.textContent = '';
            } else if (n > 0) {
                countEl.textContent = `${filteredCount} من ${total} حركة`;
            } else {
                countEl.textContent = `${total} حركة`;
            }
        }

        function clearFilters() {
            document.querySelector('input[name="txType"][value="all"]').checked = true;
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';
            document.getElementById('filterSearch').value = '';
            syncFilterChips();
            applyFiltersAndRender();
        }

        function filterTransactions() {
            const type = document.querySelector('input[name="txType"]:checked')?.value || 'all';
            const from = document.getElementById('filterDateFrom').value;
            const to = document.getElementById('filterDateTo').value;
            const q = document.getElementById('filterSearch').value.trim().toLowerCase();
            return allTransactions.filter(tx => {
                if (type === 'in' && tx.amount <= 0) return false;
                if (type === 'out' && tx.amount >= 0) return false;
                if (from && tx.transaction_date < from) return false;
                if (to && tx.transaction_date > to) return false;
                if (q && !tx.description.toLowerCase().includes(q)) return false;
                return true;
            });
        }

        function applyFiltersAndRender() {
            const filtered = filterTransactions();
            transactionsCache = filtered;
            updateFilterUI(filtered.length);
            renderList(filtered);
        }

        const AR_MONTHS = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];

        function monthLabel(monthKey) {
            const [y, m] = monthKey.split('-').map(Number);
            const now = new Date();
            if (y === now.getFullYear() && m === now.getMonth() + 1) return 'هذا الشهر';
            return `${AR_MONTHS[m - 1]} ${y}`;
        }

        function renderTxRowDesktop(tx) {
            const isIncome = tx.amount > 0;
            const amountClass = isIncome ? 'text-emerald-600' : 'text-red-600';
            return `
                <tr>
                    <td class="col-date"><span class="num text-stone-600">${fmtDate(tx.transaction_date)}</span></td>
                    <td class="col-desc"><span class="block truncate text-stone-800">${escapeHtml(tx.description)}</span></td>
                    <td class="col-amount"><span class="num font-semibold ${amountClass}">${fmt(tx.amount)}</span></td>
                    <td class="col-balance"><span class="num font-semibold text-stone-800">${fmtBalance(tx.running_balance)}</span></td>
                    <td class="col-actions">
                        <div class="flex justify-end">
                            <button type="button" data-edit="${tx.id}" title="تعديل" aria-label="تعديل"
                                class="p-2 rounded-md text-stone-400 hover:text-stone-700 hover:bg-stone-100 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path stroke-linecap="round" stroke-linejoin="round" d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button type="button" data-delete="${tx.id}" title="حذف" aria-label="حذف"
                                class="p-2 rounded-md text-stone-400 hover:text-red-600 hover:bg-red-50 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
        }

        function renderTxRowMobile(tx) {
            const isIncome = tx.amount > 0;
            const amountClass = isIncome ? 'text-emerald-600' : 'text-red-600';
            return `
                <div class="tx-feed-item" data-id="${tx.id}" role="button" tabindex="0">
                    <div class="flex justify-between items-start gap-3">
                        <span class="font-medium text-stone-900 leading-snug">${escapeHtml(tx.description)}</span>
                        <span class="num font-semibold text-base shrink-0 ${amountClass}">${fmt(tx.amount)}</span>
                    </div>
                    <div class="flex justify-between items-center gap-3 mt-1 text-xs text-stone-400">
                        <span class="num">${fmtDate(tx.transaction_date)}</span>
                        <span class="num">رصيد ${fmtBalance(tx.running_balance)}</span>
                    </div>
                </div>`;
        }

        function renderMobileFeed(transactions) {
            let html = '';
            let lastMonth = null;
            for (const tx of transactions) {
                const monthKey = tx.transaction_date.slice(0, 7);
                if (monthKey !== lastMonth) {
                    lastMonth = monthKey;
                    html += `<div class="tx-feed-month">${monthLabel(monthKey)}</div>`;
                }
                html += renderTxRowMobile(tx);
            }
            return html;
        }

        const TX_TABLE_HEADER = `
            <table class="tx-table text-sm w-full">
            <thead>
                <tr>
                    <th class="col-date">التاريخ</th>
                    <th class="col-desc">الوصف</th>
                    <th class="col-amount num-col">المبلغ</th>
                    <th class="col-balance num-col">الرصيد</th>
                    <th class="col-actions"></th>
                </tr>
            </thead>
            <tbody>`;

        function renderList(transactions) {
            const list = document.getElementById('txList');
            const empty = document.getElementById('emptyState');
            const filterEmpty = document.getElementById('filterEmptyState');
            if (!allTransactions.length) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                filterEmpty.classList.add('hidden');
                return;
            }
            empty.classList.add('hidden');
            if (!transactions.length) {
                list.innerHTML = '';
                filterEmpty.classList.remove('hidden');
                return;
            }
            filterEmpty.classList.add('hidden');
            const desktopRows = transactions.map(renderTxRowDesktop).join('');
            list.innerHTML = `
                <div class="sm:hidden">${renderMobileFeed(transactions)}</div>
                <div class="hidden sm:block">${TX_TABLE_HEADER}${desktopRows}</tbody></table></div>`;

            list.querySelectorAll('[data-edit]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tx = transactionsCache.find(t => t.id === Number(btn.dataset.edit));
                    if (tx) openEdit(tx);
                });
            });
            list.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTx(Number(btn.dataset.delete));
                });
            });
            list.querySelectorAll('.tx-feed-item').forEach(item => {
                const open = () => {
                    const tx = transactionsCache.find(t => t.id === Number(item.dataset.id));
                    if (tx) openEdit(tx);
                };
                item.addEventListener('click', open);
                item.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        open();
                    }
                });
            });
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const raw = parseFloat(normalizeDecimalInput(document.getElementById('amount').value));
            const amount = entryType === 'out' ? -Math.abs(raw) : Math.abs(raw);
            const payload = {
                amount,
                transaction_date: document.getElementById('transactionDate').value,
                description: document.getElementById('description').value.trim(),
            };
            try {
                const res = await fetch('/api/budget/transactions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const result = await res.json();
                showToast(result.message, result.success !== false ? 'success' : 'error');
                if (result.success !== false) {
                    document.getElementById('amount').value = '';
                    document.getElementById('description').value = '';
                    fetchTransactions();
                }
            } catch {
                showToast('تعذر الحفظ', 'error');
            }
        });

        function openEdit(tx) {
            document.getElementById('editId').value = tx.id;
            document.getElementById('editAmount').value = Math.abs(tx.amount);
            document.getElementById('editDate').value = tx.transaction_date;
            document.getElementById('editDescription').value = tx.description;
            setType(tx.amount >= 0 ? 'in' : 'out', true);
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEdit() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editCancel').addEventListener('click', closeEdit);
        document.getElementById('editBackdrop').addEventListener('click', closeEdit);
        document.getElementById('editDelete').addEventListener('click', () => {
            const id = document.getElementById('editId').value;
            if (id) deleteTx(Number(id), true);
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const raw = parseFloat(normalizeDecimalInput(document.getElementById('editAmount').value));
            const amount = editType === 'out' ? -Math.abs(raw) : Math.abs(raw);
            const payload = {
                amount,
                transaction_date: document.getElementById('editDate').value,
                description: document.getElementById('editDescription').value.trim(),
            };
            try {
                const res = await fetch(`/api/budget/transactions/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const result = await res.json();
                showToast(result.message, result.success !== false ? 'success' : 'error');
                if (result.success !== false) {
                    closeEdit();
                    fetchTransactions();
                }
            } catch {
                showToast('تعذر التحديث', 'error');
            }
        });

        async function deleteTx(id, fromModal = false) {
            if (!confirm('حذف هذه الحركة؟')) return;
            try {
                const res = await fetch(`/api/budget/transactions/${id}`, { method: 'DELETE' });
                const result = await res.json();
                showToast(result.message, result.success !== false ? 'success' : 'error');
                if (result.success !== false) {
                    if (fromModal) closeEdit();
                    fetchTransactions();
                }
            } catch {
                showToast('تعذر الحذف', 'error');
            }
        }

        document.getElementById('filterToggle').addEventListener('click', () => toggleFilterPanel());
        document.getElementById('clearFilters').addEventListener('click', clearFilters);
        document.getElementById('filterDateFrom').addEventListener('change', applyFiltersAndRender);
        document.getElementById('filterDateTo').addEventListener('change', applyFiltersAndRender);
        document.getElementById('filterSearch').addEventListener('input', applyFiltersAndRender);
        document.querySelectorAll('#typeFilters input').forEach(input => {
            input.addEventListener('change', () => {
                syncFilterChips();
                applyFiltersAndRender();
            });
        });

        fetchTransactions();
    </script>
</body>
</html>
